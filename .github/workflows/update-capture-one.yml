name: Update Capture One version

on:
  schedule:
  - cron: '0 8 * * 1'   # Tous les lundis à 8h UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest version info
        id: fetch
        run: |
          XML=$(curl -sSL --fail https://www.captureone.com/update/capture-one-mac.xml)
          VERSION=$(echo "$XML" | grep -A 5 "<item>" | grep "<title>" | head -n 1 | sed -E 's/.*<title>(.*)<\/title>.*/\1/')
          URL=$(echo "$XML" | grep -oE 'url="https://[^"]+\.dmg"' | head -n 1 | cut -d'"' -f2)
          
          if [ -z "$VERSION" ] || [ -z "$URL" ]; then
            echo "::error::Failed to parse version or URL"
            exit 1
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Fetched version $VERSION → $URL"

      - name: Check if update is needed
        id: diff
        run: |
          FILE="lib/unassigned/software/capture_one.yml"
          CURRENT_URL=$(grep "^- url:" "$FILE" | awk '{print $3}')
          NEW_URL="${{ steps.fetch.outputs.url }}"
          
          if [ "$CURRENT_URL" = "$NEW_URL" ]; then
            echo "needed=false" >> $GITHUB_OUTPUT
            echo "No update needed"
          else
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "Update needed: $CURRENT_URL → $NEW_URL"
          fi

      - name: Download DMG and compute SHA256
        if: steps.diff.outputs.needed == 'true'
        id: hash
        run: |
          echo "Downloading DMG (this may take a while)..."
          curl -sSL --fail --max-time 1800 "${{ steps.fetch.outputs.url }}" -o /tmp/capture_one.dmg
          
          SIZE=$(du -h /tmp/capture_one.dmg | cut -f1)
          echo "Downloaded: $SIZE"
          
          HASH=$(sha256sum /tmp/capture_one.dmg | awk '{print $1}')
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "SHA256: $HASH"
          
          rm -f /tmp/capture_one.dmg

      - name: Update YAML
        if: steps.diff.outputs.needed == 'true'
        run: |
          cat > lib/unassigned/software/capture_one.yml << EOF
          - url: ${{ steps.fetch.outputs.url }}
            hash_sha256: ${{ steps.hash.outputs.hash }}
            install_script:
              path: ./install_capture_one.sh
            uninstall_script:
              path: ./uninstall_capture_one.sh
          EOF
          
          echo "YAML updated:"
          cat lib/unassigned/software/capture_one.yml

      - name: Commit and push
        if: steps.diff.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/unassigned/software/capture_one.yml
          git commit -m "chore: update Capture One to ${{ steps.fetch.outputs.version }}"
          git push origin main